<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
    %sveltekit.head%
    <style>
      /* Default (light) theme — source of truth for CSS variables */
      :root {
        --color-bg:            #ffffff;
        --color-bg-secondary:  #f5f5f5;
        --color-bg-hover:      #f0f0f0;
        --color-surface:       #ffffff;

        --color-border:        #cccccc;
        --color-border-muted:  #e0e0e0;
        --color-border-accent: #cccccc;

        --color-text:          #000000;
        --color-text-muted:    #555555;
        --color-text-subtle:   #888888;

        --color-accent:        #f5f5f5;
        --color-accent-border: #000000;
        --color-danger:        #fff0f0;
        --color-danger-border: #cc0000;
        --color-danger-text:   #cc0000;

        --color-progress-bg:   #eeeeee;
        --color-progress-fill: #000000;

        --radius-card:  12px;
        --radius-btn:   999px;
        --radius-input: 8px;
        --radius-badge: 4px;

        --border-width: 2px;

        --font-base:    'Inter', system-ui, sans-serif;
        --font-heading: 'JetBrains Mono', monospace;

        --eyes-bg: #e4e4e4;
        --eyes-pupil: #000000;
      }

      *, *::before, *::after { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: var(--font-base);
        background: var(--color-bg);
        color: var(--color-text);
      }

      h1, h2, h3 {
  font-family: var(--font-heading);

   }

  /* DEBUG: center guideline — remove when done adjusting layout */
  html::before {
    content: '';
    position: fixed;
    top: 0;
    bottom: 0;
    left: 50%;
    width: 2px;
    background: red;
    z-index: 2147483647;
    pointer-events: none;
  }
}
    </style>
  </head>
  <body data-sveltekit-preload-data="hover" style="overflow: hidden;">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
  
</html>
